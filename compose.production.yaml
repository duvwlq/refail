services:
  mysql:
    ports: !reset []
    networks:
      - data
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 768M
          pids: 200

  backend:
    ports: !reset []
    expose:
      - "8080"
      - "9090"
    environment:
      JWT_REFRESH_COOKIE_SECURE: "true"
      RATE_LIMIT_TRUST_FORWARDED_FOR: "true"
      FRONTEND_ORIGINS: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN must be set}
      SWAGGER_ENABLED: "false"
      OBSERVABILITY_INTERNAL_METRICS: "true"
    networks:
      - edge
      - data
      - monitoring
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 640M
          pids: 200

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    ports: !reset []
    expose:
      - "3000"
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /app/.next/cache:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 384M
          pids: 100

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN must be set}
      HTTPS_PORT: ${HTTPS_PORT:-443}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${CADDYFILE_PATH:-./ops/caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - ./ops/caddy/common.caddy:/etc/caddy/common.caddy:ro
      - refail-caddy-data:/data
      - refail-caddy-config:/config
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128M
          pids: 100
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 3s
      retries: 10

  prometheus:
    ports: !reset []
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true

  grafana:
    ports: !reset []
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true

networks:
  edge:
  data:
    internal: true
  monitoring:
    internal: true

volumes:
  refail-caddy-data:
  refail-caddy-config:

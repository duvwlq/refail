name: refail

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fail}
      MYSQL_USER: ${MYSQL_USERNAME:-fail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      TZ: Asia/Seoul
    volumes:
      - refail-mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-fail}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
      MYSQL_USERNAME: ${MYSQL_USERNAME:-fail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_ACCESS_TOKEN_VALIDITY_SECONDS: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:-900}
      JWT_REFRESH_TOKEN_VALIDITY_SECONDS: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:-2592000}
      JWT_REFRESH_REUSE_GRACE_SECONDS: ${JWT_REFRESH_REUSE_GRACE_SECONDS:-5}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      SEARCH_FULLTEXT_ENABLED: ${SEARCH_FULLTEXT_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_TRUST_FORWARDED_FOR: ${RATE_LIMIT_TRUST_FORWARDED_FOR:-false}
      RATE_LIMIT_MAX_ENTRIES: ${RATE_LIMIT_MAX_ENTRIES:-10000}
      RATE_LIMIT_LOGIN_LIMIT: ${RATE_LIMIT_LOGIN_LIMIT:-5}
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:-60}
      RATE_LIMIT_SIGNUP_LIMIT: ${RATE_LIMIT_SIGNUP_LIMIT:-3}
      RATE_LIMIT_SIGNUP_WINDOW_SECONDS: ${RATE_LIMIT_SIGNUP_WINDOW_SECONDS:-3600}
      RATE_LIMIT_REFRESH_LIMIT: ${RATE_LIMIT_REFRESH_LIMIT:-10}
      RATE_LIMIT_REFRESH_WINDOW_SECONDS: ${RATE_LIMIT_REFRESH_WINDOW_SECONDS:-60}
      RATE_LIMIT_REPORT_LIMIT: ${RATE_LIMIT_REPORT_LIMIT:-5}
      RATE_LIMIT_REPORT_WINDOW_SECONDS: ${RATE_LIMIT_REPORT_WINDOW_SECONDS:-3600}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_BASE_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  refail-mysql-data:

spring:
  datasource:
    url: jdbc:h2:mem:fail;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: fail-project-jwt-secret-key-should-be-long-enough-2026
  access-token-validity-seconds: 900
  issuer: fail-test
  refresh-token-validity-seconds: 2592000
  refresh-reuse-grace-seconds: 5
  refresh-cookie-secure: false

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  search:
    fulltext-enabled: false

spring:
  application:
    name: fail
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/fail?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${MYSQL_USERNAME:fail}
    password: ${MYSQL_PASSWORD:fail}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-no-request-id}] %logger{36} - %msg%n"
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:warn}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:900}
  issuer: fail
  refresh-token-validity-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:2592000}
  refresh-reuse-grace-seconds: ${JWT_REFRESH_REUSE_GRACE_SECONDS:5}
  refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:true}

app:
  cors:
    allowed-origins: ${FRONTEND_ORIGINS:http://localhost:3000}
  search:
    fulltext-enabled: ${SEARCH_FULLTEXT_ENABLED:true}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    trust-forwarded-for: ${RATE_LIMIT_TRUST_FORWARDED_FOR:false}
    max-entries: ${RATE_LIMIT_MAX_ENTRIES:10000}
    login:
      limit: ${RATE_LIMIT_LOGIN_LIMIT:5}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    signup:
      limit: ${RATE_LIMIT_SIGNUP_LIMIT:3}
      window-seconds: ${RATE_LIMIT_SIGNUP_WINDOW_SECONDS:3600}
    refresh:
      limit: ${RATE_LIMIT_REFRESH_LIMIT:10}
      window-seconds: ${RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
    report:
      limit: ${RATE_LIMIT_REPORT_LIMIT:5}
      window-seconds: ${RATE_LIMIT_REPORT_WINDOW_SECONDS:3600}
  observability:
    internal-metrics-enabled: ${OBSERVABILITY_INTERNAL_METRICS:false}

management:
  server:
    port: ${MANAGEMENT_PORT:${server.port}}
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

spring:
  application:
    name: fail
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/fail?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${MYSQL_USERNAME:fail}
    password: ${MYSQL_PASSWORD:fail}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:warn}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-seconds: 86400
  issuer: fail

app:
  cors:
    allowed-origins: ${FRONTEND_ORIGINS:http://localhost:3000}

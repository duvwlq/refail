spring:
  datasource:
    url: jdbc:h2:mem:fail-local;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8081

jwt:
  secret: local-only-jwt-secret-key-should-be-long-enough-2026
  access-token-validity-seconds: 900
  issuer: fail-local
  refresh-cookie-secure: false

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

app:
  search:
    fulltext-enabled: false
